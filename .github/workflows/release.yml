name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - run: pnpm build

      - name: Package Electron app
        working-directory: packages/desktop
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp packages/desktop/release/*.exe artifacts/ 2>/dev/null || true
          cp packages/desktop/release/*.dmg artifacts/ 2>/dev/null || true
          cp packages/desktop/release/*.zip artifacts/ 2>/dev/null || true
          cp packages/desktop/release/*.AppImage artifacts/ 2>/dev/null || true
          cp packages/desktop/release/*.deb artifacts/ 2>/dev/null || true
          cp packages/desktop/release/latest*.yml artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: artifacts/
          retention-days: 3
          if-no-files-found: warn

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/**/*
